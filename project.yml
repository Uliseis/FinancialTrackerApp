name: FinancialTracker
options:
  bundleIdPrefix: com.uliseis
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    # Phase 4: set to the Apple Developer Team ID, then `xcodegen generate`.
    # Simulator builds work either way; device builds + CloudKit need the real team.
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  Core:
    path: Core

targets:
  FinancialTracker:
    type: application
    platform: iOS
    sources:
      - App
    resources:
      - App/Assets.xcassets
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Odyssey Finance
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: LaunchBackground
        NSFaceIDUsageDescription: "Unlock Odyssey Finance with Face ID."
        UIBackgroundModes:
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.uliseis.financialtracker.refresh
    entitlements:
      path: App/FinancialTracker.entitlements
    dependencies:
      - package: Core
        product: CoreModel
      - package: Core
        product: CoreLogic
      - package: Core
        product: CoreIntegrations
      - package: Core
        product: CoreSync
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.uliseis.financialtracker
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
